<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>404 - Wrong Site</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}body{background:radial-gradient(circle at top,#1b1b1b,#080808 65%);color:#fff;font-family:Inter,sans-serif;overflow:hidden}canvas{position:fixed;inset:0}.container{position:relative;z-index:2;width:100%;height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;padding:40px}.box{max-width:750px}#message{font-size:42px;font-weight:700;opacity:0;transform:translateY(25px);transition:opacity .8s,transform .8s;min-height:60px}.show{opacity:1!important;transform:translateY(0)!important}.hide{opacity:0!important;transform:translateY(-25px)!important}#final{margin-top:40px;opacity:0;transform:scale(.9);transition:1.2s}#final.show{opacity:1;transform:scale(1)}h1{font-size:110px;letter-spacing:8px;margin-bottom:10px}p{font-size:22px;color:#cfcfcf;margin-bottom:35px}a{display:inline-block;padding:16px 34px;border-radius:14px;background:#fff;color:#111;font-weight:700;text-decoration:none;transition:.25s;box-shadow:0 0 35px rgba(255,255,255,.18)}a:hover{transform:translateY(-4px);box-shadow:0 0 55px rgba(255,255,255,.35)}
</style></head><body><canvas id="bg"></canvas><div class="container"><div class="box"><div id="message"></div><div id="final"><h1>404</h1><p>Wrong Site, Bud.<br><br>Click below to head back home.</p><a href="https://www.pixlect-studios.com">www.pixlect-studios.com</a></div></div></div>
<script>
const c=document.getElementById("bg"),x=c.getContext("2d");function r(){c.width=innerWidth;c.height=innerHeight}r();onresize=r;const s=[];for(let i=0;i<120;i++)s.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2,v:.2+Math.random()*.6});(function d(){x.clearRect(0,0,c.width,c.height);x.fillStyle="white";for(const a of s){x.globalAlpha=.2+Math.sin(Date.now()/500+a.x)*.4;x.beginPath();x.arc(a.x,a.y,a.r,0,Math.PI*2);x.fill();a.y+=a.v;if(a.y>c.height){a.y=0;a.x=Math.random()*c.width}}requestAnimationFrame(d)})();
const m=["Hmm...","Loading...","Yes...","I think I got the connection...","And...","No...","Wrong Site, Bud."],e=document.getElementById("message"),f=document.getElementById("final");let i=0;function n(){if(i<m.length){e.classList.remove("show");e.classList.add("hide");setTimeout(()=>{e.innerText=m[i++];e.classList.remove("hide");e.classList.add("show");setTimeout(n,1500)},450)}else{e.style.display="none";f.classList.add("show")}}setTimeout(n,1000);
</script></body></html>
