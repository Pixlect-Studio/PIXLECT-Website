<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🧠 PIXGPT – AI in Browser</title>

    <!-- Pyodide from CDN -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.27.2/full/pyodide.js">
    </script>

    <style>
        /* Minimal dark chat UI */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #0a0a0a;
            color: #ddd;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: #151515;
            border-radius: 28px;
            border: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            height: 94vh;
            overflow: hidden;
        }
        .header {
            padding: 14px 24px;
            border-bottom: 1px solid #2a2a2a;
            background: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            color: #10a37f;
            font-weight: 300;
            font-size: 1.4rem;
        }
        .header h1 small {
            font-weight: 400;
            font-size: 0.7rem;
            color: #666;
            background: #1e1e1e;
            padding: 2px 12px;
            border-radius: 20px;
            margin-left: 10px;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #121212;
        }
        .msg {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            background: #222;
            flex-shrink: 0;
        }
        .msg.user .avatar { background: #10a37f; }
        .msg .bubble {
            background: #202020;
            padding: 12px 18px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            border: 1px solid #2a2a2a;
            line-height: 1.6;
            word-break: break-word;
        }
        .msg.user .bubble {
            background: #10a37f;
            color: #fff;
            border-top-left-radius: 18px;
            border-top-right-radius: 4px;
            border: none;
        }
        .input-area {
            padding: 14px 24px 18px 24px;
            background: #111;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 40px;
            border: 1px solid #2a2a2a;
            background: #1c1c1c;
            color: #eee;
            font-size: 0.95rem;
            outline: none;
        }
        .input-area input:focus { border-color: #10a37f; }
        .input-area button {
            background: #10a37f;
            border: none;
            color: #fff;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.15s;
        }
        .input-area button:hover { background: #0d8c6c; }
        .input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
        .status {
            color: #888;
            font-size: 0.8rem;
            padding: 4px 24px;
            background: #111;
            border-top: 1px solid #2a2a2a;
        }
        .status .loader {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🧠 PIXGPT <small>Browser AI</small></h1>
    </div>
    <div class="messages" id="messages"></div>
    <div class="status" id="status">⏳ Loading Python AI...</div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask anything..." disabled />
        <button id="sendBtn" disabled>Send</button>
    </div>
</div>

<script>
    // ============================================================
    //  PIXGPT – Browser AI with Pyodide (CPython in WebAssembly)
    // ============================================================

    const messagesEl = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusEl = document.getElementById('status');

    let pyodide = null;
    let ready = false;

    // ---- Add a message to the chat ----
    function addMessage(role, text, isHtml = false) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = role === 'user' ? '👤' : '🤖';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        if (isHtml) bubble.innerHTML = text;
        else bubble.textContent = text;
        div.appendChild(avatar);
        div.appendChild(bubble);
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return bubble;
    }

    // ---- Show a "thinking" indicator ----
    let thinkingEl = null;
    function showThinking() {
        removeThinking();
        const div = document.createElement('div');
        div.className = 'msg';
        div.id = 'thinking';
        div.innerHTML = `<div class="avatar">🤖</div><div class="bubble"><span style="color:#888;">Thinking...</span></div>`;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    function removeThinking() {
        const el = document.getElementById('thinking');
        if (el) el.remove();
    }

    // ---- Send message ----
    async function sendMessage() {
        if (!ready) return;
        const text = userInput.value.trim();
        if (!text) return;
        userInput.value = '';
        addMessage('user', text);
        showThinking();
        sendBtn.disabled = true;
        try {
            // Call the Python function
            const result = pyodide.runPython(`
                from app import process_message
                process_message("${text.replace(/"/g, '\\"')}")
            `);
            removeThinking();
            addMessage('ai', result);
        } catch (err) {
            removeThinking();
            addMessage('ai', '❌ Error: ' + err.message);
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // ---- Load Pyodide and the Python AI ----
    async function loadAI() {
        try {
            statusEl.textContent = '⏳ Loading Pyodide...';
            // Load Pyodide (will take a few seconds)
            pyodide = await loadPyodide({
                indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.27.2/full/'
            });
            statusEl.textContent = '⏳ Loading Python files...';

            // 1. Load Python source files
            const aiModuleCode = await fetch('ai_module.py').then(r => r.text());
            const appCode = await fetch('app.py').then(r => r.text());

            // Write them to Pyodide's virtual filesystem
            pyodide.FS.writeFile('/ai_module.py', aiModuleCode);
            pyodide.FS.writeFile('/app.py', appCode);

            // 2. Load storage.json (the trained AI brain) – if it exists
            try {
                const storageData = await fetch('storage.json').then(r => r.text());
                pyodide.FS.writeFile('/storage.json', storageData);
            } catch (e) {
                console.warn('No storage.json found – using default model.');
                // Write an empty JSON so the code doesn't crash
                pyodide.FS.writeFile('/storage.json', '{}');
            }

            // 3. Import the app module (this will run the Python code and train/load the AI)
            statusEl.textContent = '⏳ Initializing AI (this may take a moment)...';
            await pyodide.runPythonAsync(`
                import sys
                sys.path.insert(0, '/')
                # We'll import app, but we need to avoid the Flask parts if any.
                # For browser use, we'll expose a simple process_message function.
                # The app.py should be modified to not rely on Flask.
                # For now we assume it has a process_message(message) function.
                from app import process_message
                print('AI ready!')
            `);

            ready = true;
            statusEl.textContent = '✅ Ready!';
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();

            // Welcome message
            addMessage('ai', '👋 Hello! I\'m PIXGPT, your conversational AI running in your browser. Ask me anything!');

        } catch (err) {
            console.error(err);
            statusEl.textContent = '❌ Failed to load AI: ' + err.message;
            addMessage('ai', '❌ Error loading AI: ' + err.message);
        }
    }

    // ---- Start loading when page loads ----
    loadAI();
</script>
</body>
</html>
