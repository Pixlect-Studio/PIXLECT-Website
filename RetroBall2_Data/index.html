<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Retro Ball 2</title>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.3.1/peerjs.min.js'></script>
    <style>
        body { background-color: #4CAF50; }
        canvas { border: 1px solid black; display: block; margin: auto; }
        #menu { text-align: center; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-btn">← Back to Site</a>
<style>
  .back-btn {
  display: inline-block;
  text-decoration: none;
  padding: 10px 20px;
  font-size: 16px;
  background-color: #007bff;
  color: white;
  border-radius: 5px;
  transition: background 0.3s ease;
}

.back-btn:hover {
  background-color: #0056b3;
}

</style>
    <div id='menu'>
        <h1>Retro Ball 2</h1>
        <label for='mode'>Select Mode:</label>
        <select id='mode'>
            <option value='multiplayer'>Multiplayer</option>
            <option value='mobile'>Mobile</option>
            <option value='pc'>PC</option>
        </select>
        <br>
        <label for='color'>Select Team Color:</label>
        <select id='color'>
            <option value='blue'>Blue</option>
            <option value='red'>Red</option>
        </select>
        <br>
        <button onclick='startGame()'>Start Game</button>
    </div>
    <canvas id='gameCanvas' width='800' height='400'></canvas>
    <script>
        let canvas = document.getElementById('gameCanvas');
        let ctx = canvas.getContext('2d');
        let players = { 'blue': { x: 100, y: 200 }, 'red': { x: 700, y: 200 } };
        let mode, color;

        function startGame() {
            mode = document.getElementById('mode').value;
            color = document.getElementById('color').value;
            document.getElementById('menu').style.display = 'none';
            gameLoop();
        }

        function drawField() {
            ctx.fillStyle = 'green';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'white';
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
        }

        function drawPlayers() {
            ctx.fillStyle = color;
            ctx.fillRect(players[color].x, players[color].y, 20, 20);
            ctx.fillStyle = color === 'blue' ? 'red' : 'blue';
            ctx.fillRect(players[color === 'blue' ? 'red' : 'blue'].x, players[color === 'blue' ? 'red' : 'blue'].y, 20, 20);
        }

        function gameLoop() {
            drawField();
            drawPlayers();
            requestAnimationFrame(gameLoop);
        }

        // Key controls for PC
        document.addEventListener('keydown', function(e) {
            if (mode === 'pc') {
                if (e.key === 'w') players[color].y -= 5;
                if (e.key === 's') players[color].y += 5;
                if (e.key === 'a') players[color].x -= 5;
                if (e.key === 'd') players[color].x += 5;
                if (e.key === ' ') alert('Pass or Shoot');
                if (e.key === 'e') alert('Tackle');
            }
        });
    </script>
</body>
</html>
